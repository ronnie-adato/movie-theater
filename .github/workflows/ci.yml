# GitHub Actions CI for MovieTheater
# This workflow builds and tests the project on Ubuntu, macOS, and Windows

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Conan
        run: python -m pip install conan
      - name: Conan profile detect
        run: conan profile detect --force
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.0'
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4
      - name: Conan install
        run: conan install conanfile.txt --output-folder=build/conan --build=missing -s build_type=Release
      - name: Configure CMake
        run: cmake --preset conan-release -DBUILD_TESTS=ON
      - name: Build
        run: cmake --build --preset conan-release
      - name: Run tests
        run: ctest --test-dir build/conan/build/Release --output-on-failure
